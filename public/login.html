<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StandingWave · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="login-wrap">
  <form class="login-card" id="loginForm">
    <div class="wordmark">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 20 Q8 16 13 19 Q18 22 23 18 Q25 16.5 26 15" stroke="oklch(52% 0.18 200)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M9 17.5 L19 11" stroke="oklch(52% 0.18 200)" stroke-width="2" stroke-linecap="round"/>
        <line x1="15" y1="13.5" x2="14" y2="10.5" stroke="oklch(25% 0.025 240)" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="14" cy="9.2" r="1.6" fill="oklch(25% 0.025 240)"/>
        <path d="M14 11.5 L16.5 12.5" stroke="oklch(25% 0.025 240)" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="wordmark-name">Standing<span class="accent">Wave</span></div>
        <div class="wordmark-sub">BEACH CAM</div>
      </div>
    </div>
    <div class="login-field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" autofocus>
    </div>
    <button class="login-btn" type="submit">Enter</button>
    <div class="login-error" id="loginError"></div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('password').value }),
    });
    if (res.ok) {
      location.href = '/';
    } else {
      const body = await res.json().catch(() => ({}));
      errEl.textContent = body.error || 'login failed';
    }
  } catch {
    errEl.textContent = 'network error';
  }
});
</script>
</body>
</html>
