services:
  standingwave:
    build: .
    container_name: standingwave
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_PASSWORD: ${APP_PASSWORD:?set APP_PASSWORD in .env}
      RECORD_MAX_HOURS: ${RECORD_MAX_HOURS:-4}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      STORAGE_CAP_GB: ${STORAGE_CAP_GB:-50}
    volumes:
      - recordings:/data

volumes:
  recordings:
